<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FinNova Academy</title>
    <!-- PWA configuration links -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // ─── Check for updates: clean cache on new version ───
      (async function() {
        try {
          const res = await fetch('https://finnova-back.onrender.com/api/health');
          const data = await res.json();
          if (data.version) {
            const stored = localStorage.getItem('app_version');
            if (stored && stored !== data.version) {
              console.log('[App] New version detected:', data.version, '(was:', stored + ')');
              // Clear all caches
              localStorage.clear();
              if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(k => caches.delete(k)));
              }
              // Store new version and reload
              localStorage.setItem('app_version', data.version);
              window.location.reload(true);
            } else if (!stored) {
              localStorage.setItem('app_version', data.version);
              console.log('[App] Version:', data.version);
            }
          }
        } catch(e) { console.log('[App] Version check unavailable'); }
      })();
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
